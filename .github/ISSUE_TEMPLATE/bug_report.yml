name: 🐛 Bug Report
description: Report a bug or unexpected behavior in a component
title: '[Bug]: '
labels: ['bug', 'status: needs-triage']
body:
    - type: markdown
      attributes:
          value: Thanks for reporting a bug! Please search existing issues first, then fill out the form below.

    - type: input
      id: component
      attributes:
          label: Component
          description: Which component is affected?
          placeholder: Button
      validations:
          required: true

    - type: textarea
      id: description
      attributes:
          label: Describe the bug
          description: A clear and concise description of what the bug is and what you expected instead.
      validations:
          required: true

    - type: textarea
      id: reproduction
      attributes:
          label: Reproduction
          description: A minimal repro — a link (StackBlitz / Svelte REPL / repo) or a code snippet. Bugs without a repro may be closed.
      validations:
          required: true

    - type: input
      id: version
      attributes:
          label: sv5ui version
          placeholder: 1.8.0
      validations:
          required: true

    - type: dropdown
      id: area
      attributes:
          label: Area
          description: Which aspect does this bug relate to? (optional)
          options:
              - 'Not sure'
              - a11y
              - types
              - performance
              - security
              - build
              - testing
      validations:
          required: false

    - type: checkboxes
      id: checks
      attributes:
          label: Checklist
          options:
              - label: I searched existing issues and this is not a duplicate.
                required: true
              - label: I reproduced this on the latest version of sv5ui.
                required: false
